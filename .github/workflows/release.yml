name: Build & Release Chrome Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Version: $MANIFEST_VERSION"

      - name: Lint for Firefox (web-ext)
        run: |
          npx --yes web-ext@latest lint \
            --ignore-files "**/*.test.js" "test-fixture.html" "package.json" "docs/**" "**/*.md" ".github/**" "chrome-web-store-description.txt" "web-ext-artifacts/**"

      - name: Build zip for Chrome Web Store
        run: |
          ZIP_NAME="sars-testing-tools-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            popup.html \
            popup.css \
            popup.js \
            js/ \
            icons/ \
            -x "*.DS_Store"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "Built $ZIP_NAME"
          unzip -l "$ZIP_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

      - name: Submit to AMO (Firefox listed)
        continue-on-error: true   # AMO listed review is async; sign exits non-zero on review timeout
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx --yes web-ext@latest sign \
            --channel listed \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --ignore-files "**/*.test.js" "test-fixture.html" "package.json" "docs/**" "**/*.md" ".github/**" "chrome-web-store-description.txt" "web-ext-artifacts/**"
